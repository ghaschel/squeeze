name: Feature request
description: Suggest an improvement or new capability for squeezit
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Feature requests are most useful when they describe the problem clearly, not only the desired implementation.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What workflow, limitation, or pain point are you trying to address?
      placeholder: I want to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want to see.
      placeholder: squeezit should...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any workarounds or alternative designs?
  - type: textarea
    id: examples
    attributes:
      label: Example usage
      description: Share example commands, flags, or output if relevant.
      render: shell
  - type: dropdown
    id: impact
    attributes:
      label: Expected impact
      description: How important is this request for your workflow?
      options:
        - Nice to have
        - Useful improvement
        - High impact
        - Blocking adoption
    validations:
      required: true
