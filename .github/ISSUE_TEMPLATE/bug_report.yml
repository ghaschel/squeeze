name: Bug report
description: Report a reproducible problem in squeezit
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem.

        Please include enough detail for the issue to be reproduced locally.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps to trigger the issue.
      placeholder: |
        1. Run `squeezit ...`
        2. Use this directory structure...
        3. Observe the error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      placeholder: The CLI should...
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
      placeholder: The CLI actually...
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command and output
      description: Paste the exact command and any relevant output or stack trace.
      render: shell
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Node version, package manager, install method, and relevant external binaries.
      placeholder: |
        OS: macOS 15 / Ubuntu 24.04
        Node: v22.x
        Package manager: npm / bun
        Install method: global npm install / bunx / local build
        Tools installed: pngcrush, optipng, exiftool...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that would help debug the issue.
